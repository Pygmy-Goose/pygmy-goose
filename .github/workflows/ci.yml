name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ci-${{ runner.os }}-${{ github.ref }}
          max-size: 2G
          restore-keys: |
            ci-${{ runner.os }}-refs/heads/main
            ci-${{ runner.os }}-

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - name: Setup
        run: |
          uv venv
          uv pip install black==24.10.0 clang_format==11.0.1 cmake-format

      - name: Format Check
        run: make format-check

      - name: Build
        env:
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
          GENERATOR: ninja
        run: |
          make release

      - name: Test
        run: |
          make unittest_release
