name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - name: Setup
        run: |
          uv venv
          uv pip install black==24.10.0 clang_format==11.0.1 cmake-format

      - name: Format Check
        run: make format-check

      - name: Build
        run: |
          mkdir -p build/release
          cd build/release
          cmake -G Ninja ../..
          ninja

      - name: Test
        run: |
          ./test/unittest
